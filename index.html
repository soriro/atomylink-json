<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            height: 100%;
            background-color: #333;
            color: white;
            padding: 15px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
        }
        .menu.active {
            display: block;
        }
        .hamburger {
            cursor: pointer;
            font-size: 24px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div class="menu" id="slideMenu">
        <h2>Menu</h2>
        <p><a href="#">Link 1</a></p>
        <p><a href="#">Link 2</a></p>
        <p><a href="#">Link 3</a></p>
        <p><a href="#" onclick="toggleMenu()">Close</a></p>
    </div>
    <script>
        function toggleMenu() {
            const menu = document.getElementById('slideMenu');
            menu.classList.toggle('active');
        }
    </script>
</body>
</html>
